<div class="i18n-viewer-container">
  <mat-form-field class="filter-field">
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Search in any field..." #input>
  </mat-form-field>

  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort class="i18n-table">
      <!-- Line Number Column -->
      <ng-container matColumnDef="lineNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Line</th>
        <td mat-cell *matCellDef="let element">{{element.lineNumber}}</td>
      </ng-container>

      <!-- File Name Column -->
      <ng-container matColumnDef="fileName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>File</th>
        <td mat-cell *matCellDef="let element">{{element.fileName}}</td>
      </ng-container>

      <!-- Label Column -->
      <ng-container matColumnDef="label">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Label</th>
        <td mat-cell *matCellDef="let element">{{element.label}}</td>
      </ng-container>

      <!-- Meaning Column -->
      <ng-container matColumnDef="meaning">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Meaning</th>
        <td mat-cell *matCellDef="let element">{{element.meaning || '-'}}</td>
      </ng-container>

      <!-- Description Column -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Description</th>
        <td mat-cell *matCellDef="let element">
          <span class="description-cell" [matTooltip]="element.description || '-'">
            {{element.description || '-'}}
          </span>
        </td>
      </ng-container>

      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let element">{{element.id || '-'}}</td>
      </ng-container>

      <!-- Validity Column -->
      <ng-container matColumnDef="isValid">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
        <td mat-cell *matCellDef="let element">
          <mat-chip [color]="getValidityColor(element.isValid)" selected>
            {{getValidityText(element.isValid)}}
          </mat-chip>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button [matTooltip]="getTooltipContent(element)" (click)="viewFullTag(element.tag)">
            <mat-icon>info</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when there is no matching data -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="8">No data matching the filter "{{input.value}}"</td>
      </tr>
    </table>
  </div>

  <mat-paginator [pageSizeOptions]="[10, 25, 50, 100]"
                 aria-label="Select page of i18n labels">
  </mat-paginator>
</div>
